{% load static %} {% load formulario_extras %}
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Datos del Curso</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <h2 class="text-center mb-4">📘 Datos del Curso</h2>

      <!-- Mensajes de éxito o error -->
      {% if messages %} {% for message in messages %}
      <div class="alert alert-{{ message.tags }} text-center">
        {{ message }}
      </div>
      {% endfor %} {% endif %}

      <form method="POST" class="p-4 bg-white shadow rounded">
        {% csrf_token %}
        <div class="mb-3">
          <label for="{{ form.tipo_curso.id_for_label }}" class="form-label">
            <strong>Tipo de Curso:</strong>
          </label>
          {{ form.tipo_curso|add_class:"form-control" }}
        </div>

        <div class="mb-3">
          <label for="id_disciplina" class="form-label"
            ><strong>Disciplina:</strong></label
          >
          <select name="disciplina" id="id_disciplina" class="form-control">
            <!-- Se llenará con JS -->
          </select>
        </div>

        <div class="text-center">
          <button type="submit" class="btn btn-danger btn-lg w-100">
            Inscribirse
          </button>
        </div>
      </form>

      <!-- ✅ Enlace para ver cursos registrados -->
      <div class="text-center mt-4">
        <a href="{% url 'lista_cursos' %}" class="btn btn-outline-secondary">
          Ver cursos registrados
        </a>
      </div>
    </div>

    <script src="{% static 'js/formulario_curso.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
